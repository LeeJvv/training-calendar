<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#12312d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Training">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Comrades Training Calendar</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Comrades 2027</p>
          <h1>Training Calendar</h1>
        </div>
        <button class="icon-button" id="todayButton" title="Jump to current week" aria-label="Jump to current week">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/></svg>
        </button>
      </header>

      <main>
        <section class="summary-grid" aria-label="Training summary">
          <article>
            <span>Planned</span>
            <strong id="plannedTotal">0 km</strong>
          </article>
          <article>
            <span>Actual</span>
            <strong id="actualTotal">0 km</strong>
          </article>
          <article>
            <span>Variance</span>
            <strong id="varianceTotal">0 km</strong>
          </article>
          <article>
            <span>Done</span>
            <strong id="completionTotal">0%</strong>
          </article>
        </section>

        <section class="toolbar" aria-label="Calendar controls">
          <div class="segmented" role="tablist" aria-label="View">
            <button class="active" data-view="week" role="tab" aria-selected="true">Week</button>
            <button data-view="calendar" role="tab" aria-selected="false">Calendar</button>
            <button data-view="log" role="tab" aria-selected="false">Log</button>
          </div>
          <label class="search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z"/></svg>
            <input id="searchInput" type="search" placeholder="Search phase, race, week">
          </label>
        </section>

        <section class="week-control" aria-label="Selected week">
          <button class="icon-button" id="prevWeek" title="Previous week" aria-label="Previous week">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <div>
            <p id="weekPhase">Phase</p>
            <h2 id="weekTitle">Week</h2>
          </div>
          <button class="icon-button" id="nextWeek" title="Next week" aria-label="Next week">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </section>

        <section id="weekView" class="view-panel"></section>
        <section id="calendarView" class="view-panel hidden"></section>
        <section id="logView" class="view-panel hidden"></section>
      </main>

      <nav class="bottom-actions" aria-label="Data actions">
        <button id="exportCsv">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
          CSV
        </button>
        <button id="exportJson">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Backup
        </button>
        <label class="file-action">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0-12 4 4m-4-4-4 4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
          Restore
          <input id="importJson" type="file" accept="application/json">
        </label>
      </nav>
    </div>

    <template id="dayTemplate">
      <article class="day-card">
        <div class="day-head">
          <div>
            <p class="day-name"></p>
            <h3 class="day-date"></h3>
          </div>
          <label class="done-toggle">
            <input type="checkbox">
            <span>Done</span>
          </label>
        </div>
        <label>Plan<input class="planned-text" type="text"></label>
        <div class="km-row">
          <label>Planned km<input class="planned-km" inputmode="decimal" type="number" min="0" step="0.1"></label>
          <label>Actual km<input class="actual-km" inputmode="decimal" type="number" min="0" step="0.1"></label>
        </div>
        <label>Notes<textarea class="notes" rows="2"></textarea></label>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
